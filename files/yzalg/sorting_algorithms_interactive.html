<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sorting animations on the same small data</title>
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --ink: #162232;
  --muted: #5a6778;
  --line: #cdd8e5;
  --default: #045073;
  --compare: #e39b22;
  --swap: #d64f4f;
  --special: #377069;
  --sorted: #399175;
  --range: #e7f0f8;
  --aux: #eff4f8;
  --gap: #ffffff;
  --gapline: #b4becc;
  --floating: #fff6d6;
  --shadow: 0 8px 24px rgba(13, 38, 89, 0.06);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
}
.page {
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 20px 32px;
}
header {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 22px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 18px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(1.6rem, 2vw + 1rem, 2.4rem);
}
.subtitle {
  color: var(--muted);
  margin-bottom: 14px;
}
.dataset {
  font-weight: 700;
  background: #eef4fa;
  border: 1px solid var(--line);
  border-radius: 999px;
  display: inline-block;
  padding: 8px 12px;
  margin-bottom: 12px;
}
.global-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 14px;
  align-items: center;
  margin-top: 10px;
}
button {
  appearance: none;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  padding: 10px 14px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
}
button:hover { background: #f3f7fb; }
button.primary {
  background: #0d2659;
  color: white;
  border-color: #0d2659;
}
button.primary:hover { filter: brightness(1.03); }
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 18px;
  align-items: center;
  color: var(--muted);
  margin-top: 12px;
}
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.swatch {
  width: 15px;
  height: 15px;
  border-radius: 4px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 18px;
}
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 18px 18px 16px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.card-head h2 {
  margin: 0;
  font-size: 1.45rem;
}
.step-label {
  color: var(--muted);
  font-weight: 700;
  white-space: nowrap;
}
.meta {
  color: var(--muted);
  font-size: 0.95rem;
}
canvas {
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 10;
  border-radius: 16px;
  background: #fbfdff;
  border: 1px solid #e3edf6;
}
.message {
  min-height: 3.1em;
  color: var(--ink);
}
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.controls button {
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 0.95rem;
}
.speed-wrap {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: white;
}
input[type="range"] {
  width: 180px;
}
.note {
  color: var(--muted);
  margin-top: 16px;
}
code {
  background: #eef4fa;
  padding: 0.1em 0.35em;
  border-radius: 6px;
}
@media (max-width: 760px) {
  .controls { gap: 8px; }
  button { padding: 9px 12px; }
  .card-head { align-items: flex-start; flex-direction: column; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Sorting animations on the same small data</h1>
    <div class="subtitle">Six standalone, playable animations using the exact same input so you can compare how each algorithm moves values around.</div>
    <div class="dataset">Input data: [7, 3, 5, 1, 8, 2, 6, 4]</div>
    <div class="global-controls">
      <button class="primary" id="playAll">Play all</button>
      <button id="pauseAll">Pause all</button>
      <button id="resetAll">Reset all</button>
      <label class="speed-wrap">Speed
        <input id="speed" type="range" min="1" max="6" value="3">
        <span id="speedLabel">3×</span>
      </label>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="swatch" style="background: var(--default)"></span>unsolved</span>
      <span class="legend-item"><span class="swatch" style="background: var(--compare)"></span>compare</span>
      <span class="legend-item"><span class="swatch" style="background: var(--swap)"></span>write / swap</span>
      <span class="legend-item"><span class="swatch" style="background: var(--special)"></span>pivot / min / key</span>
      <span class="legend-item"><span class="swatch" style="background: var(--sorted)"></span>sorted</span>
    </div>
  </header>

  <section class="grid" id="grid"></section>
</div>

function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function textWidth(ctx, text, font) {
  ctx.save();
  ctx.font = font;
  const w = ctx.measureText(text).width;
  ctx.restore();
  return w;
}

function fitCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = Math.round(rect.width * dpr);
  const h = Math.round(rect.height * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}

function barColor(frame, idx) {
  if ((frame.sorted || []).includes(idx)) return COLORS.sorted;
  if ((frame.swap || []).includes(idx)) return COLORS.swap;
  if ((frame.compare || []).includes(idx)) return COLORS.compare;
  if ((frame.special || []).includes(idx)) return COLORS.special;
  return COLORS.default;
}

function drawChart(canvas, frame) {
  const ctx = fitCanvas(canvas);
  const width = canvas.clientWidth;
  const height = canvas.clientHeight;
  ctx.clearRect(0, 0, width, height);

  const marginX = 18;
  const range = frame.range || [];
  let auxTop = 8;
  let top = 18;

  ctx.font = '13px system-ui, sans-serif';
  ctx.fillStyle = COLORS.ink;

  if ((frame.aux || []).length) {
    frame.aux.forEach((aux, row) => {
      const y = auxTop + row * 28;
      ctx.font = '700 13px system-ui, sans-serif';
      ctx.fillStyle = COLORS.ink;
      ctx.fillText(aux.label, marginX, y + 17);
      let x = marginX + 22;
      const cellW = 30;
      aux.values.forEach((v, idx) => {
        const isPointer = aux.pointer === idx;
        drawRoundedRect(ctx, x, y, cellW, 22, 6, isPointer ? COLORS.compare : COLORS.aux, isPointer ? COLORS.compare : COLORS.line);
        ctx.fillStyle = COLORS.ink;
        ctx.font = '13px system-ui, sans-serif';
        const t = String(v);
        ctx.fillText(t, x + cellW / 2 - textWidth(ctx, t, '13px system-ui, sans-serif') / 2, y + 15);

  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(chartLeft, chartBottom);
  ctx.lineTo(chartRight, chartBottom);
  ctx.stroke();

  arr.forEach((value, idx) => {
    const x = chartLeft + idx * (barW + barGap);
    const idxY = chartBottom + 20;
    ctx.fillStyle = COLORS.muted;
    ctx.font = '12px system-ui, sans-serif';
    const idxText = String(idx);
    ctx.fillText(idxText, x + barW / 2 - textWidth(ctx, idxText, '12px system-ui, sans-serif') / 2, idxY);

    if (value === null) {

      ctx.fillText(valueText, x + barW / 2 - textWidth(ctx, valueText, '700 15px system-ui, sans-serif') / 2, y + 18);
    } else {

class Player {
  constructor(name, payload) {
    this.name = name;
    this.frames = payload.frames;
    this.stats = payload.stats;
    this.complexity = payload.complexity;
    this.index = 0;
    this.timer = null;
    this.createCard();
    this.render();
  }

  get speed() {
    return Number(document.getElementById('speed').value);
  }

  get delay() {
    return Math.max(100, 700 - this.speed * 90);
  }

  createCard() {
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-head">
        <h2>${this.name}</h2>
        <span class="step-label"></span>
      </div>
      <div class="meta">${this.complexity} · comparisons on this input: ${this.stats.comparisons} · writes/swaps: ${this.stats.writes}</div>
      <canvas></canvas>
      <div class="message"></div>
      <div class="controls">
        <button class="primary play">Play</button>
        <button class="pause">Pause</button>
        <button class="step">Step</button>
        <button class="reset">Reset</button>
      </div>
    `;
    this.el = card;
    this.stepLabel = card.querySelector('.step-label');
    this.message = card.querySelector('.message');
    this.canvas = card.querySelector('canvas');

    card.querySelector('.play').addEventListener('click', () => this.play());
    card.querySelector('.pause').addEventListener('click', () => this.pause());
    card.querySelector('.step').addEventListener('click', () => this.step());
    card.querySelector('.reset').addEventListener('click', () => this.reset());

    document.getElementById('grid').appendChild(card);
  }

  currentFrame() {
    return this.frames[this.index];
  }

  render() {
    this.stepLabel.textContent = `Step ${this.index + 1} / ${this.frames.length}`;
    this.message.textContent = this.currentFrame().message;
    drawChart(this.canvas, this.currentFrame());
  }

  tick() {
    if (this.index < this.frames.length - 1) {
      this.index += 1;
      this.render();
    } else {
      this.pause();
    }
  }

  play() {
    if (this.index >= this.frames.length - 1) {
      this.index = 0;
      this.render();
    }
    this.pause();
    this.timer = setInterval(() => this.tick(), this.delay);
  }

  pause() {
    if (this.timer) {
      clearInterval(this.timer);
      this.timer = null;
    }
  }

  step() {
    this.pause();
    if (this.index < this.frames.length - 1) {
      this.index += 1;
      this.render();
    }
  }

  reset() {
    this.pause();
    this.index = 0;
    this.render();
  }

  updateSpeedIfPlaying() {
    if (this.timer) {
      this.play();
    }
  }
}

const players = ORDER.map(name => new Player(name, DATA[name]));

document.getElementById('playAll').addEventListener('click', () => players.forEach(p => p.play()));
document.getElementById('pauseAll').addEventListener('click', () => players.forEach(p => p.pause()));
document.getElementById('resetAll').addEventListener('click', () => players.forEach(p => p.reset()));

const speed = document.getElementById('speed');
const speedLabel = document.getElementById('speedLabel');
speed.addEventListener('input', () => {
  speedLabel.textContent = `${speed.value}×`;
  players.forEach(p => p.updateSpeedIfPlaying());
});

window.addEventListener('resize', () => players.forEach(p => p.render()));
</script>
</body>
</html>
